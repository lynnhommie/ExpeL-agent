<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <style>text{font-family:Arial,sans-serif}.title{font-size:16px;font-weight:bold}.val{font-size:11px;font-weight:bold;fill:#333}.leg{font-size:11px}</style>
  <text x="300" y="30" text-anchor="middle" class="title">成功会话 vs 失败会话 — 平均奖励对比</text>
  <!-- 0线 -->
  <line x1="60" y1="280" x2="550" y2="280" stroke="#999" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="55" y="284" text-anchor="end" font-size="10" fill="#999">0</text>
  <!-- baseline: 成功-1.0, 失败-1.0 -->
  <rect x="80" y="320" width="50" height="-40" fill="#2ecc71" rx="2"/>
  <text x="105" y="335" text-anchor="middle" class="val">-1.0</text>
  <rect x="145" y="320" width="50" height="-40" fill="#e74c3c" rx="2"/>
  <text x="170" y="335" text-anchor="middle" class="val">-1.0</text>
  <!-- persona: 成功1.4, 失败0.0 -->
  <rect x="245" y="160" width="50" height="120" fill="#2ecc71" rx="2"/>
  <text x="270" y="152" text-anchor="middle" class="val">1.4</text>
  <rect x="310" y="280" width="50" height="0" fill="#e74c3c" rx="2"/>
  <text x="335" y="295" text-anchor="middle" class="val">0.0</text>
  <!-- expel_mvp: 成功1.7, 失败1.0 -->
  <rect x="410" y="110" width="50" height="170" fill="#2ecc71" rx="2"/>
  <text x="435" y="102" text-anchor="middle" class="val">1.7</text>
  <rect x="475" y="180" width="50" height="100" fill="#e74c3c" rx="2"/>
  <text x="500" y="172" text-anchor="middle" class="val">1.0</text>
  <!-- 分组标签 -->
  <text x="105" y="365" text-anchor="middle" class="leg">baseline</text>
  <text x="270" y="365" text-anchor="middle" class="leg">persona</text>
  <text x="435" y="365" text-anchor="middle" class="leg">expel_mvp</text>
  <!-- 图例 -->
  <rect x="220" y="20" width="10" height="10" fill="#2ecc71"/><text x="235" y="30" class="leg">成功会话</text>
  <rect x="320" y="20" width="10" height="10" fill="#e74c3c"/><text x="335" y="30" class="leg">失败会话</text>
</svg>
