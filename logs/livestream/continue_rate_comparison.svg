<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <style>text{font-family:Arial,sans-serif}.title{font-size:16px;font-weight:bold}.val{font-size:11px;font-weight:bold;fill:#333}.leg{font-size:11px}</style>
  <text x="300" y="30" text-anchor="middle" class="title">成功会话 vs 失败会话 — 续聊率对比</text>
  <!-- baseline: 成功0%, 失败0% -->
  <rect x="80" y="330" width="50" height="0" fill="#2ecc71" rx="2"/>
  <text x="105" y="345" text-anchor="middle" class="val">0%</text>
  <rect x="145" y="330" width="50" height="0" fill="#e74c3c" rx="2"/>
  <text x="170" y="345" text-anchor="middle" class="val">0%</text>
  <!-- persona: 成功55%, 失败0% -->
  <rect x="245" y="185" width="50" height="145" fill="#2ecc71" rx="2"/>
  <text x="270" y="177" text-anchor="middle" class="val">55.0%</text>
  <rect x="310" y="330" width="50" height="0" fill="#e74c3c" rx="2"/>
  <text x="335" y="345" text-anchor="middle" class="val">0%</text>
  <!-- expel_mvp: 成功75%, 失败0% -->
  <rect x="410" y="120" width="50" height="210" fill="#2ecc71" rx="2"/>
  <text x="435" y="112" text-anchor="middle" class="val">75.0%</text>
  <rect x="475" y="330" width="50" height="0" fill="#e74c3c" rx="2"/>
  <text x="500" y="345" text-anchor="middle" class="val">0%</text>
  <!-- 分组标签 -->
  <text x="105" y="365" text-anchor="middle" class="leg">baseline</text>
  <text x="270" y="365" text-anchor="middle" class="leg">persona</text>
  <text x="435" y="365" text-anchor="middle" class="leg">expel_mvp</text>
  <!-- 图例 -->
  <rect x="220" y="20" width="10" height="10" fill="#2ecc71"/><text x="235" y="30" class="leg">成功会话</text>
  <rect x="320" y="20" width="10" height="10" fill="#e74c3c"/><text x="335" y="30" class="leg">失败会话</text>
</svg>
