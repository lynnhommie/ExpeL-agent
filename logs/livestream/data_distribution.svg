<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" width="700" height="400">
  <style>text{font-family:Arial,sans-serif}.title{font-size:18px;font-weight:bold}.leg{font-size:11px}</style>
  <text x="350" y="30" text-anchor="middle" class="title">数字人直播 — 数据统计概览</text>
  <!-- 饼图简示 -->
  <circle cx="200" cy="220" r="100" fill="#2ecc71"/>
  <path d="M200,120 A100,100 0 0,1 265,295 L200,220 Z" fill="#e74c3c"/>
  <path d="M200,120 A100,100 0 0,0 160,312 L200,220 Z" fill="#f39c12"/>
  <text x="200" y="215" text-anchor="middle" font-size="12" font-weight="bold">121条</text>
  <text x="200" y="340" text-anchor="middle" font-size="12">成功50% | 失败41% | 不安全9%</text>
  <!-- 柱状图 -->
  <text x="500" y="70" text-anchor="middle" class="title" font-size="14">各类别轨迹数量</text>
  <rect x="410" y="220" width="50" height="120" fill="#2ecc71" rx="2"/>
  <text x="435" y="212" text-anchor="middle" font-size="11" font-weight="bold">61</text>
  <rect x="485" y="250" width="50" height="90" fill="#e74c3c" rx="2"/>
  <text x="510" y="242" text-anchor="middle" font-size="11" font-weight="bold">50</text>
  <rect x="560" y="310" width="50" height="30" fill="#f39c12" rx="2"/>
  <text x="585" y="302" text-anchor="middle" font-size="11" font-weight="bold">10</text>
  <text x="435" y="355" text-anchor="middle" font-size="11">success</text>
  <text x="510" y="355" text-anchor="middle" font-size="11">failure</text>
  <text x="585" y="355" text-anchor="middle" font-size="11">unsafe</text>
  <!-- 图例 -->
  <rect x="30" y="355" width="10" height="10" fill="#2ecc71"/><text x="45" y="365" class="leg">成功对话</text>
  <rect x="120" y="355" width="10" height="10" fill="#e74c3c"/><text x="135" y="365" class="leg">失败对话</text>
  <rect x="210" y="355" width="10" height="10" fill="#f39c12"/><text x="225" y="365" class="leg">不安全对话</text>
</svg>
